# Bash agent: terminal contrastive training (verifier-free)
# Experiment 2: GRPO + TC loss, no external reward function

model = "Qwen/Qwen2.5-1.5B-Instruct"

[env]
id = "bash_agent"

[inference]
gpus = 1

[inference.args]
enforce_eager = true

[trainer]
gpus = 1

[trainer.args]
run_name = "bash-agent-tc"
skip_weight_sync = true   # use plain vllm serve (no vf-vllm needed)

# Standard training
use_lora = true
lora_rank = 16
learning_rate = 1e-5
micro_batch_size = 8        # should be a multiple of rollouts_per_example
rollouts_per_example = 8
batch_size = 160            # 20 tasks × 8 rollouts
max_steps = 50              # Experiment 2: just 50 steps to check if loss moves
max_tokens = 1024
max_seq_len = 4096

# Terminal contrastive loss (verifier-free)
use_terminal_contrastive = true
terminal_sim_thresh_pos = 0.70   # tune up if too many false positives
terminal_sim_thresh_neg = 0.20
terminal_contrastive_weight = 0.15
terminal_contrastive_temperature = 0.1
terminal_sim_measure = "strict"  # number-strict + containment jaccard

# Watch in W&B:
#   tc/positive_pair_rate  — should be > 0.3 (gate for Experiment 1)
#   tc/diversity           — watch for collapse toward 0
#   tc_loss/mean           — should decrease over training
