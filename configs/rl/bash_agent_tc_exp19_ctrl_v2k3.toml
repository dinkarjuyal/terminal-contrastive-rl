# Bash agent: V2 control (K=3 near-collinear axes) — same-pod baseline for Exp19b.
# Identical to Exp10 but with reward-vector dumping enabled so we can measure the
# K=3 correlation (expected: strict~jaccard collinear -> mean|rho| high) on the
# same hardware/seed as the K=5 MRPO run. This is the left endpoint of the §7
# correlation curve.

model = "Qwen/Qwen2.5-1.5B-Instruct"

exclude_task_ids = ["find_py", "find_exec", "sort_uniq"]

[env]
id = "bash_agent"

[inference]
gpus = 1

[inference.args]
enforce_eager = true

[trainer]
gpus = 1

[trainer.args]
run_name = "bash-agent-tc-exp19-ctrl-v2k3"
report_to = "none"
max_concurrent = 32

use_lora = true
lora_rank = 16
learning_rate = 1e-5
micro_batch_size = 8
rollouts_per_example = 8
batch_size = 88
max_steps = 200
save_steps = 20
max_tokens = 512
max_seq_len = 2048

use_terminal_contrastive = true
terminal_sim_measure = "strict"

use_vector_tc = true
reward_vector_dim = 3
reward_axes = ["strict", "jaccard", "exit"]
reward_vector_dump_path = "/tmp/exp19_v2k3_rvecs.jsonl"
dirichlet_alpha = 1.0
variational_beta = 0.01

vllm_server_port = 8000

nccl_group_port = 51216
