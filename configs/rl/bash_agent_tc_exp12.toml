# Bash agent: Variational TC (V1) + weight sync — Seed 2
# Experiment 12: Same as Exp9 but seed=43 for statistical significance
# Establishes task-level CI without relying on single seed rollout-level z-test.
#
# Comparison:
#   Exp9:  variational TC V1 + weight sync, seed=42 → 0.714
#   Exp12: variational TC V1 + weight sync, seed=43 → (this)

model = "Qwen/Qwen2.5-1.5B-Instruct"

exclude_task_ids = ["find_py", "find_exec", "sort_uniq"]

[env]
id = "bash_agent"

[inference]
gpus = 1

[inference.args]
enforce_eager = true

[trainer]
gpus = 1

[trainer.args]
run_name = "bash-agent-tc-exp12"
report_to = "none"
max_concurrent = 1
seed = 43

use_lora = true
lora_rank = 16
learning_rate = 1e-5
micro_batch_size = 8
rollouts_per_example = 8
batch_size = 88
max_steps = 200
save_steps = 20
max_tokens = 512
max_seq_len = 2048

use_terminal_contrastive = true
terminal_sim_measure = "strict"

use_variational_tc = true
variational_beta = 0.01

vllm_server_port = 8004
nccl_group_port = 51217
