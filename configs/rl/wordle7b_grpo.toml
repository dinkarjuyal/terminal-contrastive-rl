# Wordle status-quo baseline: GRPO on the env's default (weighted) reward. Multi-turn.
model = "Qwen/Qwen2.5-7B-Instruct"
[env]
id = "wordle"
[inference]
gpus = 1
[inference.args]
enforce_eager = true
[trainer]
gpus = 1
[trainer.args]
run_name = "wordle7b-grpo"
report_to = "none"
max_concurrent = 32
use_lora = true
lora_rank = 16
learning_rate = 1e-5
micro_batch_size = 4
rollouts_per_example = 8
batch_size = 88
max_steps = 100
save_steps = 20
max_tokens = 512
max_seq_len = 4096
vllm_server_port = 8000
nccl_group_port = 51216
