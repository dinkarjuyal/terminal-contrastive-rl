# Smoke test on nodeset node 7: validates env + vLLM/trainer + the NEW MGDA-VPO
# GPU path (never run before). 6 steps only. mbs=rollouts_per_example=8 so each
# microbatch is one full group (MGDA operates on the 8 per-trajectory gradients).
# H100 80GB -> mbs=8 fits.

model = "Qwen/Qwen2.5-1.5B-Instruct"
exclude_task_ids = ["find_py", "find_exec", "sort_uniq"]

[env]
id = "bash_agent"

[inference]
gpus = 1

[inference.args]
enforce_eager = true

[trainer]
gpus = 1

[trainer.args]
run_name = "bash-agent-tc-smoke-mgda"
report_to = "none"
max_concurrent = 32

use_lora = true
lora_rank = 16
learning_rate = 1e-5
micro_batch_size = 8
rollouts_per_example = 8
batch_size = 88
max_steps = 6
save_steps = 6
max_tokens = 512
max_seq_len = 2048

use_terminal_contrastive = true
terminal_sim_measure = "strict"

use_vector_tc = true
reward_vector_dim = 3
reward_axes = ["strict", "jaccard", "exit"]
reward_vector_dump_path = "/tmp/smoke_mgda_rvecs.jsonl"
dirichlet_alpha = 1.0
variational_beta = 0.01

use_mgda_vpo = true
mgda_grad_method = "loop"

vllm_server_port = 8000
nccl_group_port = 51216
