# GSM8K status-quo baseline: standard GRPO with the env's ground-truth verifier
# reward (the "famous task + strong baseline" the generalisation study needs).
# Qwen2.5-1.5B, same trainer/weight-sync stack as the bash experiments.
model = "Qwen/Qwen2.5-1.5B-Instruct"

[env]
id = "sentence_repeater"

[inference]
gpus = 1
[inference.args]
enforce_eager = true

[trainer]
gpus = 1
[trainer.args]
run_name = "sentence_repeater-grpo"
report_to = "none"
max_concurrent = 32
use_lora = true
lora_rank = 16
learning_rate = 1e-5
micro_batch_size = 8
rollouts_per_example = 8
batch_size = 88
max_steps = 100
save_steps = 20
max_tokens = 768
max_seq_len = 2048
vllm_server_port = 8000
nccl_group_port = 51216
