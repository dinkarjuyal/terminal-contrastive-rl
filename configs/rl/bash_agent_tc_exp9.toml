# Bash agent: Variational TC (V1) + weight sync
# Experiment 9: exp8 conditions + weight sync (GPU 0 vf-vllm + GPU 1 trainer)
# Tests whether V1 variational reward + weight sync compound gains.
#
# Comparison:
#   Exp5:  discrete TC + skip_ws  → 0.598
#   Exp6:  discrete TC + weight sync → 0.688  (best so far)
#   Exp8:  variational TC + skip_ws → (running)
#   Exp9:  variational TC + weight sync → (this)

model = "Qwen/Qwen2.5-1.5B-Instruct"

exclude_task_ids = ["find_py", "find_exec", "sort_uniq"]

[env]
id = "bash_agent"

[inference]
gpus = 1

[inference.args]
enforce_eager = true

[trainer]
gpus = 1

[trainer.args]
run_name = "bash-agent-tc-exp9"
report_to = "none"
max_concurrent = 1

use_lora = true
lora_rank = 16
learning_rate = 1e-5
micro_batch_size = 8
rollouts_per_example = 8
batch_size = 88
max_steps = 200
max_tokens = 512
max_seq_len = 2048

use_terminal_contrastive = true
terminal_sim_measure = "strict"

use_variational_tc = true
variational_beta = 0.01

vllm_server_port = 8001
