# Bash agent: terminal contrastive training (verifier-free)
# Experiment 4: weight sync enabled — vLLM inference weights update after each step

model = "Qwen/Qwen2.5-1.5B-Instruct"

[env]
id = "bash_agent"

[inference]
gpus = 1

[inference.args]
enforce_eager = true

[trainer]
gpus = 1

[trainer.args]
run_name = "bash-agent-tc-exp4"
report_to = "none"
max_concurrent = 1

# Standard training
use_lora = true
lora_rank = 16
learning_rate = 1e-5
micro_batch_size = 8        # must equal rollouts_per_example for TC pairs to form
rollouts_per_example = 8
batch_size = 40             # 5 tasks × 8 rollouts (headroom for NCCL weight sync buffers)
max_steps = 200
max_tokens = 512
max_seq_len = 2048

# Terminal contrastive loss (verifier-free)
use_terminal_contrastive = true
terminal_sim_thresh_pos = 0.70
terminal_sim_thresh_neg = 0.20
terminal_contrastive_weight = 0.15
terminal_contrastive_temperature = 0.1
terminal_sim_measure = "strict"

# Watch in logs:
#   tc/positive_pair_rate  — should be > 0.3
#   tc/diversity           — watch for collapse toward 0
#   tc_loss/mean           — should decrease
#   mismatch_kl            — now meaningful: policy vs behavior policy (both updating)
