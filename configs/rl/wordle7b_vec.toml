# Wordle MULTI-AXIS: reward vector = the env's own rubric functions
# [check_answer (win), partial_credit (info), count_turns (efficiency)], combined
# via Dirichlet (V2). Variants: +use_mgda_vpo (MGDA), dirichlet_alpha=1000 (fixed).
model = "Qwen/Qwen2.5-7B-Instruct"
[env]
id = "wordle"
[inference]
gpus = 1
[inference.args]
enforce_eager = true
[trainer]
gpus = 1
[trainer.args]
run_name = "wordle7b-vec"
report_to = "none"
max_concurrent = 32
use_lora = true
lora_rank = 16
learning_rate = 1e-5
micro_batch_size = 4
rollouts_per_example = 8
batch_size = 88
max_steps = 100
save_steps = 20
max_tokens = 512
max_seq_len = 4096
use_terminal_contrastive = true
use_vector_tc = true
reward_source = "rubric"
reward_vector_dim = 3
reward_axes = ["check_answer_reward_func", "partial_credit_reward_func", "count_turns_reward_func"]
reward_vector_dump_path = "/tmp/wordle_vec7b_rvecs.jsonl"
dirichlet_alpha = 1.0
variational_beta = 0.01
vllm_server_port = 8000
nccl_group_port = 51216
