# Bash agent: V2 vector lambda + skip_weight_sync (single GPU)
# Exp10-sw: runs while nutrain occupies ~52GB/GPU (29GB headroom = enough for skip_ws)
# Comparison cell: V2+skip_ws (analogous to exp5=V1+skip_ws, exp8=VarTC+skip_ws)

model = "Qwen/Qwen2.5-1.5B-Instruct"
exclude_task_ids = ["find_py", "find_exec", "sort_uniq"]

[env]
id = "bash_agent"

[inference]
gpus = 1

[inference.args]
enforce_eager = true

[trainer]
gpus = 1

[trainer.args]
run_name = "bash-agent-tc-exp10-sw"
skip_weight_sync = true
report_to = "none"
max_concurrent = 1

use_lora = true
lora_rank = 16
learning_rate = 1e-5
micro_batch_size = 8
rollouts_per_example = 8
batch_size = 88
max_steps = 200
save_steps = 20
max_tokens = 512
max_seq_len = 2048

use_terminal_contrastive = true
terminal_sim_measure = "strict"

use_vector_tc = true
reward_vector_dim = 3
dirichlet_alpha = 1.0
variational_beta = 0.01

vllm_server_port = 8003
