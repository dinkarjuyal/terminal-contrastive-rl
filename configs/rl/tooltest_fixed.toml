# GSM8K verifier-FREE: vector reward from answer consensus (self-consistency) +
# format + brevity, combined via Dirichlet (V2). No ground truth used in training.
# Tests whether the bash findings (collapse, MGDA reliability) replicate on a
# standard math benchmark. Variants: +use_mgda_vpo (MGDA), dirichlet_alpha=1000 (fixed).
model = "Qwen/Qwen2.5-1.5B-Instruct"

[env]
id = "tool_test"

[inference]
gpus = 1
[inference.args]
enforce_eager = true

[trainer]
gpus = 1
[trainer.args]
run_name = "tooltest-fixed-fixed"
report_to = "none"
max_concurrent = 32
use_lora = true
lora_rank = 16
learning_rate = 1e-5
micro_batch_size = 8
rollouts_per_example = 8
batch_size = 88
max_steps = 100
save_steps = 20
max_tokens = 768
max_seq_len = 2048

use_terminal_contrastive = true
use_vector_tc = true
reward_source = "rubric"
reward_vector_dim = 4
reward_axes = ["tool_A_calls", "tool_B_calls", "tool_C_calls", "tool_D_calls"]
reward_vector_dump_path = "/tmp/tooltest_fixed_rvecs.jsonl"
dirichlet_alpha = 1000.0
variational_beta = 0.01

vllm_server_port = 8000
nccl_group_port = 51216
